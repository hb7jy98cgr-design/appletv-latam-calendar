<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple TV LATAM · Transactional Calendar 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0a0a0a;
      --surface:       #161616;
      --surface2:      #222222;
      --surface3:      #2d2d2d;
      --text:          #f5f5f7;
      --text2:         #98989d;
      --text3:         #555559;
      --blue:          #0A84FF;
      --blue-bg:       rgba(10,132,255,0.10);
      --blue-border:   rgba(10,132,255,0.25);
      --orange:        #FF9F0A;
      --orange-bg:     rgba(255,159,10,0.09);
      --orange-border: rgba(255,159,10,0.22);
      --green:         #30D158;
      --purple:        #BF5AF2;
      --border:        rgba(255,255,255,0.07);
      --r:             10px;
      --header-h:      68px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      z-index: 200;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .brand-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text2);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .cal-wrap {
      padding: 30px 32px 60px;
      transition: padding-right 0.32s cubic-bezier(.4,0,.2,1);
    }

    .cal-wrap.shifted { padding-right: 416px; }

    /* ── MONTH CONTROLS ─────────────────────────────────── */
    .month-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .month-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.6px;
    }

    .month-title .yr { color: var(--text3); font-weight: 400; }

    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-today {
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-today:hover { background: var(--surface3); color: var(--text); }

    .btn-nav {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .btn-nav:hover { background: var(--surface3); }

    /* ── PROMO BANNER ────────────────────────────────────── */
    .promo-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--orange-bg);
      border: 1px solid var(--orange-border);
      border-radius: var(--r);
      padding: 13px 18px;
      margin-bottom: 18px;
      cursor: pointer;
      transition: background .15s;
    }
    .promo-banner:hover { background: rgba(255,159,10,0.15); }
    .promo-banner.off { display: none; }

    .pb-left { display: flex; align-items: center; gap: 13px; }
    .pb-icon  { font-size: 20px; }
    .pb-name  { font-size: 13px; font-weight: 600; color: var(--orange); }
    .pb-meta  { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .pb-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--orange);
      color: #000;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── CALENDAR GRID ───────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .col-hd {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 6px 0 10px;
    }
    .col-hd.thu-hd { color: var(--orange); }

    .cell {
      min-height: 100px;
      background: var(--surface);
      border-radius: 9px;
      padding: 9px 10px;
      border: 1.5px solid transparent;
      transition: border-color .15s, transform .12s, box-shadow .15s;
      overflow: hidden;
    }

    .cell.blank {
      background: rgba(22,22,22,0.35);
    }

    .cell.clickable { cursor: pointer; }
    .cell.clickable:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0,0,0,.5);
    }

    .cell.has-rel  { background: var(--blue-bg);   border-color: var(--blue-border); }
    .cell.has-promo-wk { background: var(--orange-bg); border-color: var(--orange-border); }
    .cell.has-rel.has-promo-wk {
      background: linear-gradient(135deg, var(--blue-bg) 0%, var(--orange-bg) 100%);
      border-color: var(--blue-border);
    }

    .cell.has-rel.clickable:hover   { border-color: var(--blue); }
    .cell.has-promo-wk.clickable:hover { border-color: var(--orange); }

    .cell.selected.has-rel {
      border-color: var(--blue) !important;
      box-shadow: 0 0 0 1px var(--blue), 0 6px 28px rgba(10,132,255,.22) !important;
    }
    .cell.selected.has-promo-wk {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 1px var(--orange), 0 6px 28px rgba(255,159,10,.2) !important;
    }

    .cell-num {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }
    .cell.blank .cell-num,
    .cell:not(.has-rel):not(.has-promo-wk) .cell-num { color: var(--text3); }

    .today-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 23px;
      height: 23px;
      background: var(--blue);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    /* chips */
    .chip {
      font-size: 10.5px;
      font-weight: 500;
      padding: 3px 7px;
      border-radius: 5px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chip-rel   { background: rgba(10,132,255,.18); color: #6cb6ff; border: 1px solid rgba(10,132,255,.25); }
    .chip-promo { background: rgba(255,159,10,.16); color: #ffb340; border: 1px solid rgba(255,159,10,.25); }
    .chip-more  { font-size: 10px; color: var(--text3); padding: 0 2px; margin-top: 1px; }

    /* ── SIDE PANEL ──────────────────────────────────────── */
    .panel {
      position: fixed;
      right: 0;
      top: var(--header-h);
      width: 384px;
      height: calc(100vh - var(--header-h));
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px 20px 40px;
      transform: translateX(100%);
      transition: transform .32s cubic-bezier(.4,0,.2,1);
      z-index: 100;
    }
    .panel.open { transform: translateX(0); }

    .panel-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .panel-label {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-bottom: 4px;
    }

    .panel-heading {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 3px;
      transition: background .15s, color .15s;
    }
    .close-btn:hover { background: var(--surface3); color: var(--text); }

    .hr { height: 1px; background: var(--border); margin: 16px 0; }

    .sec-head {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      margin: 18px 0 10px;
    }

    .movie-item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      background: var(--surface2);
      border-radius: 9px;
      padding: 11px 13px;
      margin-bottom: 6px;
    }

    .mi-icon {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .mi-icon.blue   { background: rgba(10,132,255,.2);  }
    .mi-icon.orange { background: rgba(255,159,10,.18); }

    .mi-body { flex: 1; min-width: 0; }

    .mi-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.2px;
    }
    .tag-mx   { background: rgba(48,209,88,.14);  color: var(--green);  }
    .tag-pl   { background: rgba(191,90,242,.14); color: var(--purple); }
    .tag-mxpl { background: rgba(10,132,255,.14); color: var(--blue);   }
    .tag-tier { background: rgba(255,159,10,.14); color: var(--orange); }
    .tag-id   {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 10px;
      color: var(--text2);
      background: var(--surface3);
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.2px;
    }

    .promo-card {
      background: linear-gradient(135deg, rgba(255,159,10,.1), rgba(255,159,10,.03));
      border: 1px solid var(--orange-border);
      border-radius: 9px;
      padding: 13px 14px;
      margin-bottom: 14px;
    }
    .promo-card-name   { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 3px; }
    .promo-card-period { font-size: 11px; color: var(--text2); }

    /* ── COPY BLOCK ──────────────────────────────────────── */
    .copy-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .copy-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 13px;
      border-bottom: 1px solid var(--border);
    }

    .copy-block-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--orange-border);
      background: var(--orange-bg);
      color: var(--orange);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }

    .copy-btn:hover {
      background: rgba(255,159,10,0.22);
    }

    .copy-btn.copied {
      background: rgba(48,209,88,0.14);
      border-color: rgba(48,209,88,0.3);
      color: var(--green);
    }

    .id-list-pre {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 11.5px;
      color: var(--text2);
      line-height: 1.8;
      padding: 11px 13px;
      white-space: pre;
      overflow-x: auto;
      max-height: 160px;
      overflow-y: auto;
    }

    /* ── ADD RELEASE FORM ───────────────────────────────── */
    .add-form {
      background: var(--surface2);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 9px;
      padding: 13px;
      margin-top: 20px;
    }

    .add-form-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .add-input {
      width: 100%;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      margin-bottom: 7px;
      transition: border-color .15s;
    }
    .add-input:focus { border-color: var(--blue); }

    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 7px;
    }

    .add-select {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 8px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }

    .add-id-input { flex: 1; margin-bottom: 0; }

    .add-btn {
      width: 100%;
      background: var(--blue-bg);
      border: 1px solid var(--blue-border);
      border-radius: 7px;
      padding: 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .add-btn:hover { background: rgba(10,132,255,0.22); }

    .del-btn {
      margin-left: auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,69,58,0.1);
      border: none;
      color: #ff453a;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .del-btn:hover { background: rgba(255,69,58,0.25); }

    .tag-custom {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.07);
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .copy-block-master {
      border-color: rgba(191,90,242,0.3);
      background: rgba(191,90,242,0.05);
      margin-bottom: 18px;
    }

    .copy-block-master .copy-block-header {
      background: rgba(191,90,242,0.08);
    }

    .copy-block-master .copy-block-label {
      color: var(--purple);
    }

    .copy-btn-master {
      border-color: rgba(191,90,242,0.3);
      background: rgba(191,90,242,0.1);
      color: var(--purple);
    }
    .copy-btn-master:hover { background: rgba(191,90,242,0.22); }
    .copy-btn-master.copied {
      background: rgba(48,209,88,0.14);
      border-color: rgba(48,209,88,0.3);
      color: var(--green);
    }

    /* ── SEARCH ──────────────────────────────────────────────── */
    .search-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .search-btn:hover { background: var(--surface3); color: var(--text); }
    .search-btn kbd {
      font-size: 10px;
      background: var(--surface3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--text3);
      font-family: inherit;
    }

    .search-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 14vh;
    }
    .search-overlay.hidden { display: none; }

    .search-box {
      width: 580px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 28px 64px rgba(0,0,0,0.7);
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--border);
    }
    .search-ico { font-size: 17px; color: var(--text3); flex-shrink: 0; }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }
    .search-input::placeholder { color: var(--text3); }

    .search-clear {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .search-clear:hover { color: var(--text); background: var(--surface2); }

    .search-results { max-height: 400px; overflow-y: auto; }

    .search-empty {
      padding: 36px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
      line-height: 1.6;
    }

    .result-group-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      padding: 12px 18px 6px;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background .1s;
      border-radius: 0;
    }
    .result-item:hover,
    .result-item.focused { background: var(--surface2); }

    .result-item-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .result-item-icon.rel   { background: var(--blue-bg); }
    .result-item-icon.promo { background: var(--orange-bg); }

    .result-item-body { flex: 1; min-width: 0; }

    .result-item-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-item-sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
    }

    .result-item-id {
      font-size: 10px;
      font-family: 'SF Mono','Menlo','Monaco',monospace;
      color: var(--text3);
      background: var(--surface3);
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .search-footer {
      padding: 8px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .search-footer-hint {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-footer-hint kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      color: var(--text2);
    }
    .search-count {
      font-size: 11px;
      color: var(--text3);
    }

    /* ── PASSWORD GATE ──────────────────────────────────────── */
    #gate {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #gate.hidden { display: none; }

    .gate-card {
      width: 340px;
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .gate-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg,#1c1c1e,#2c2c2e);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 18px;
    }

    .gate-title {
      font-size: 18px;
      font-weight: 700;
      color: #f5f5f7;
      letter-spacing: -0.3px;
      margin-bottom: 5px;
    }

    .gate-sub {
      font-size: 12px;
      color: #555559;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 28px;
    }

    .gate-input {
      width: 100%;
      background: #222;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 11px 14px;
      color: #f5f5f7;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      transition: border-color .15s;
      margin-bottom: 10px;
    }
    .gate-input:focus { border-color: var(--purple); }
    .gate-input.error { border-color: #ff453a; animation: shake .3s ease; }

    .gate-btn {
      width: 100%;
      background: var(--purple);
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s;
      margin-bottom: 12px;
    }
    .gate-btn:hover { opacity: 0.85; }

    .gate-error {
      font-size: 12px;
      color: #ff453a;
      min-height: 16px;
      text-align: center;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

<!-- ── PASSWORD GATE ──────────────────────────────────────── -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-icon">📺</div>
    <div class="gate-title">Apple TV LATAM</div>
    <div class="gate-sub">Team Access Only</div>
    <input class="gate-input" id="gateInput" type="password"
           placeholder="Password" onkeydown="if(event.key==='Enter') checkGate()" />
    <button class="gate-btn" onclick="checkGate()">Enter →</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<!-- ── SEARCH MODAL ────────────────────────────────────────── -->
<div class="search-overlay hidden" id="searchOverlay" onclick="if(event.target===this) closeSearch()">
  <div class="search-box">
    <div class="search-input-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Search movies, Apple IDs, promotions…"
             oninput="onSearchInput(event)"
             onkeydown="onSearchKey(event)" />
      <button class="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-results" id="searchResults">
      <div class="search-empty">Type to search across all releases and promotions…</div>
    </div>
    <div class="search-footer">
      <div class="search-footer-hint">
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>↵</kbd> open</span>
        <span><kbd>esc</kbd> close</span>
      </div>
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>
</div>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-icon">📺</div>
    <div>
      <div class="brand-title">Apple TV LATAM</div>
      <div class="brand-sub">Transactional Calendar · 2026</div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <span class="legend-dot" style="background:var(--blue)"></span> New Release
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background:var(--orange)"></span> Promotion
    </div>
    <button class="search-btn" onclick="openSearch()">
      🔍 Search <kbd>⌘K</kbd>
    </button>
  </div>
</header>

<!-- ── CALENDAR ───────────────────────────────────────────── -->
<div class="cal-wrap" id="calWrap">
  <div class="month-bar">
    <div class="month-title" id="monthTitle"></div>
    <div class="controls">
      <button class="btn-today" onclick="goToday()">Today</button>
      <button class="btn-nav"   onclick="changeMonth(-1)">‹</button>
      <button class="btn-nav"   onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div id="promoBanner" class="promo-banner off"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- ── SIDE PANEL ─────────────────────────────────────────── -->
<div class="panel" id="panel">
  <div class="panel-top">
    <div>
      <div class="panel-label" id="panelLabel"></div>
      <div class="panel-heading" id="panelHeading"></div>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div id="panelBody"></div>
</div>

<script src="calendar-data.js"></script>
<script>
/* ── DATA loaded from calendar-data.js ───────────────────── */

/* ── STATE ────────────────────────────────────────────────── */
const TODAY  = new Date(2026, 4, 20); // May 20 2026
let curYear  = 2026;
let curMonth = 5;        // 0-indexed → June
let selKey   = null;

/* ── UTILS ────────────────────────────────────────────────── */
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function mkKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function parseKey(k) { return new Date(k + 'T12:00:00'); }

function inPromoRange(k) {
  const d = parseKey(k);
  return PROMOTIONS.some(p => d >= parseKey(p.start) && d <= parseKey(p.end));
}

function promosOnThursday(k) {
  const d = parseKey(k);
  if (d.getDay() !== 4) return [];
  return PROMOTIONS.filter(p => d >= parseKey(p.start) && d <= parseKey(p.end));
}

function marketTag(m) {
  if (m === 'MX + PL') return `<span class="tag tag-mxpl">MX · PL</span>`;
  if (m === 'MX only') return `<span class="tag tag-mx">MX</span>`;
  if (m === 'PL only') return `<span class="tag tag-pl">PL</span>`;
  return '';
}

function fmtDate(k) {
  return parseKey(k).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

/* ── RENDER CALENDAR ──────────────────────────────────────── */
function render() {
  const y = curYear, m = curMonth;
  const firstDow   = new Date(y, m, 1).getDay();
  const daysInMon  = new Date(y, m+1, 0).getDate();

  // Title
  document.getElementById('monthTitle').innerHTML =
    `${MONTHS[m]} <span class="yr">${y}</span>`;

  // Promo banner
  const banner = document.getElementById('promoBanner');
  const mStart = new Date(y, m, 1);
  const mEnd   = new Date(y, m+1, 0);
  const activeP = PROMOTIONS.filter(p => parseKey(p.start) <= mEnd && parseKey(p.end) >= mStart);

  if (activeP.length) {
    const p = activeP[0];
    banner.classList.remove('off');
    banner.innerHTML = `
      <div class="pb-left">
        <span class="pb-icon">🏷️</span>
        <div>
          <div class="pb-name">${p.name} · ${p.studio}</div>
          <div class="pb-meta">${p.start} &rarr; ${p.end} &nbsp;·&nbsp; ${p.titles.length} titles active this period</div>
        </div>
      </div>
      <span class="pb-badge">${p.titles.length} titles</span>`;
    banner.onclick = () => openPromoPanel(p);
  } else {
    banner.classList.add('off');
  }

  // Grid
  let html = '';

  DAYS.forEach((d, i) => {
    html += `<div class="col-hd${i === 4 ? ' thu-hd' : ''}">${d}</div>`;
  });

  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cell blank"></div>`;
  }

  for (let d = 1; d <= daysInMon; d++) {
    const key   = mkKey(y, m, d);
    const rels  = getReleasesForDate(key);
    const promos = promosOnThursday(key);
    const inPrm  = inPromoRange(key);
    const isToday = y === TODAY.getFullYear() && m === TODAY.getMonth() && d === TODAY.getDate();
    const hasRel  = rels.length > 0;
    const hasPrm  = promos.length > 0;

    let cls = 'cell clickable';
    if (hasRel)  cls += ' has-rel';
    if (inPrm)   cls += ' has-promo-wk';
    if (key === selKey) cls += ' selected';

    let inner = '';

    // Day number
    if (isToday) {
      inner += `<div class="cell-num"><span class="today-badge">${d}</span></div>`;
    } else {
      inner += `<div class="cell-num">${d}</div>`;
    }

    // Promo chip on Thursdays
    if (hasPrm) {
      inner += `<div class="chip chip-promo">🏷️ ${promos[0].name}</div>`;
    }

    // Release chips
    if (hasRel) {
      const visible = rels.slice(0, hasPrm ? 1 : 2);
      visible.forEach(r => {
        inner += `<div class="chip chip-rel">🎬 ${r.title}</div>`;
      });
      if (rels.length > visible.length) {
        inner += `<div class="chip-more">+${rels.length - visible.length} more</div>`;
      }
    }

    const handler = `onclick="openDayPanel('${key}')"`;
    html += `<div class="${cls}" id="c-${key}" ${handler}>${inner}</div>`;
  }

  document.getElementById('grid').innerHTML = html;
}

/* ── PANEL ────────────────────────────────────────────────── */
function openDayPanel(key) {
  selKey = key;
  const rels   = getReleasesForDate(key);
  const promos = promosOnThursday(key);
  const d = parseKey(key);

  document.getElementById('panelLabel').textContent =
    DAYS[d.getDay()].toUpperCase() + ' · ' + MONTHS[d.getMonth()].toUpperCase() + ' ' + d.getFullYear();
  document.getElementById('panelHeading').textContent =
    d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

  const custom = loadCustomReleases();
  const customCount = (custom[key] || []).length;
  const staticCount = (RELEASES[key] || []).length;

  let body = '';

  if (rels.length) {
    body += `<div class="sec-head">🎬 New Releases &nbsp;—&nbsp; ${rels.length} title${rels.length > 1 ? 's' : ''}</div>`;
    rels.forEach((r, i) => {
      const isCustom = i >= staticCount;
      const customIdx = i - staticCount;
      body += `
        <div class="movie-item">
          <div class="mi-icon blue">🎬</div>
          <div class="mi-body">
            <div class="mi-name">${r.title}</div>
            <div class="tags">
              ${marketTag(r.market)}
              ${r.appleId ? `<span class="tag-id">ID: ${r.appleId}</span>` : ''}
              ${isCustom ? `<span class="tag-custom">custom</span>` : ''}
            </div>
          </div>
          ${isCustom ? `<button class="del-btn" onclick="deleteCustomRelease('${key}', ${customIdx})" title="Remove">×</button>` : ''}
        </div>`;
    });
  }

  if (promos.length) {
    // ── Master combined list for the whole week ───────────────
    const allWeekIds = promos.flatMap(p => p.titles.map(t => t.appleId));
    body += `<div class="sec-head">🗓️ Weekly Master List &nbsp;—&nbsp; ${[...new Set(allWeekIds.filter(Boolean))].length} unique IDs</div>`;
    body += copyBlockAll(allWeekIds);

    // ── Individual promotion themes ───────────────────────────
    promos.forEach(p => {
      body += `<div class="sec-head">🏷️ Active Promotion &nbsp;—&nbsp; ${p.titles.length} titles</div>
        <div class="promo-card">
          <div class="promo-card-name">${p.name} · ${p.studio}</div>
          <div class="promo-card-period">${p.start} &rarr; ${p.end}</div>
        </div>
        ${copyBlock(p)}`;
      p.titles.forEach(t => {
        body += `
          <div class="movie-item">
            <div class="mi-icon orange">🏷️</div>
            <div class="mi-body">
              <div class="mi-name">${t.title}</div>
              <div class="tags">
                <span class="tag tag-tier">Tier ${t.tier}</span>
                <span class="tag-id">${t.appleId}</span>
              </div>
            </div>
          </div>`;
      });
    });
  }

  // ── Add Release form ──────────────────────────────────────
  body += `
    <div class="add-form">
      <div class="add-form-title">➕ Add Release</div>
      <input class="add-input" id="addTitle" type="text" placeholder="Movie title…" />
      <div class="add-row">
        <select class="add-select" id="addMarket">
          <option>MX + PL</option>
          <option>MX only</option>
          <option>PL only</option>
        </select>
        <input class="add-input add-id-input" id="addAppleId" type="text" placeholder="Apple ID (opt.)" />
      </div>
      <button class="add-btn" onclick="addRelease()">+ Add to Calendar</button>
    </div>`;

  document.getElementById('panelBody').innerHTML = body;
  showPanel();
  updateSelected();
}

function openPromoPanel(p) {
  selKey = null;
  document.getElementById('panelLabel').textContent   = 'PROMOTION OVERVIEW';
  document.getElementById('panelHeading').textContent = p.name;

  let body = `
    <div class="promo-card">
      <div class="promo-card-name">${p.name} · ${p.studio}</div>
      <div class="promo-card-period">${p.start} &rarr; ${p.end}</div>
    </div>
    <div class="sec-head">🏷️ ${p.titles.length} Active Titles</div>
    ${copyBlock(p)}`;

  p.titles.forEach(t => {
    body += `
      <div class="movie-item">
        <div class="mi-icon orange">🏷️</div>
        <div class="mi-body">
          <div class="mi-name">${t.title}</div>
          <div class="tags">
            <span class="tag tag-tier">Tier ${t.tier}</span>
            <span class="tag-id">${t.appleId}</span>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('panelBody').innerHTML = body;
  showPanel();
  updateSelected();
}

/* ── CUSTOM RELEASES (localStorage) ──────────────────────── */
function loadCustomReleases() {
  try { return JSON.parse(localStorage.getItem('customReleases') || '{}'); }
  catch { return {}; }
}

function saveCustomReleases(data) {
  localStorage.setItem('customReleases', JSON.stringify(data));
}

function getReleasesForDate(key) {
  const custom = loadCustomReleases();
  const staticRels = RELEASES[key] || [];
  const customRels = (custom[key] || []).map(r => ({ ...r, isCustom: true }));
  return [...staticRels, ...customRels];
}

function addRelease() {
  const titleEl  = document.getElementById('addTitle');
  const marketEl = document.getElementById('addMarket');
  const idEl     = document.getElementById('addAppleId');
  const title    = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }

  const entry = { title, market: marketEl.value, appleId: idEl.value.trim() || null };
  const custom = loadCustomReleases();
  if (!custom[selKey]) custom[selKey] = [];
  custom[selKey].push(entry);
  saveCustomReleases(custom);
  searchIndex = null; // refresh search index

  render();
  openDayPanel(selKey);
}

function deleteCustomRelease(key, idx) {
  const custom = loadCustomReleases();
  if (custom[key]) {
    custom[key].splice(idx, 1);
    if (custom[key].length === 0) delete custom[key];
    saveCustomReleases(custom);
    searchIndex = null; // refresh search index
    render();
    openDayPanel(key);
  }
}

function copyBlockAll(ids) {
  const unique = [...new Set(ids.filter(Boolean))];
  const idsPlain = unique.join('\n');
  const idsArr   = unique.join(',');
  return `
    <div class="copy-block copy-block-master">
      <div class="copy-block-header">
        <span class="copy-block-label">🗓️ Full Week — ${unique.length} unique IDs</span>
        <button class="copy-btn copy-btn-master" onclick="copyIds(this, [${idsArr}])">
          ⎘ Copy All
        </button>
      </div>
      <div class="id-list-pre">${idsPlain}</div>
    </div>`;
}

function copyBlock(p) {
  const ids = p.titles.map(t => t.appleId).join('&#10;');
  const idsPlain = p.titles.map(t => t.appleId).join('\n');
  return `
    <div class="copy-block">
      <div class="copy-block-header">
        <span class="copy-block-label">📋 Apple IDs — ready to copy</span>
        <button class="copy-btn" id="copyBtn-${p.name.replace(/\s/g,'')}" onclick="copyIds(this, [${p.titles.map(t => t.appleId).join(',')}])">
          ⎘ Copy All
        </button>
      </div>
      <div class="id-list-pre">${idsPlain}</div>
    </div>`;
}

function copyIds(btn, idsArray) {
  const text = idsArray.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '⎘ Copy All';
    }, 2000);
  });
}

function showPanel() {
  document.getElementById('panel').classList.add('open');
  document.getElementById('calWrap').classList.add('shifted');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('calWrap').classList.remove('shifted');
  selKey = null;
  updateSelected();
}

function updateSelected() {
  document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
  if (selKey) {
    const el = document.getElementById('c-' + selKey);
    if (el) el.classList.add('selected');
  }
}

/* ── NAV ──────────────────────────────────────────────────── */
function changeMonth(delta) {
  curMonth += delta;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth <  0) { curMonth = 11; curYear--; }
  closePanel();
  render();
}

function goToday() {
  curYear  = TODAY.getFullYear();
  curMonth = TODAY.getMonth();
  closePanel();
  render();
}

/* ── SEARCH ───────────────────────────────────────────────── */
let searchIndex = null;
let focusedIdx  = -1;

function buildSearchIndex() {
  const idx = [];
  // All static releases
  Object.entries(RELEASES).forEach(([dateStr, movies]) => {
    movies.forEach(m => {
      idx.push({ type:'release', title: m.title, date: dateStr,
                 appleId: m.appleId, market: m.market });
    });
  });
  // Custom releases from localStorage
  const custom = loadCustomReleases();
  Object.entries(custom).forEach(([dateStr, movies]) => {
    movies.forEach(m => {
      idx.push({ type:'release', title: m.title, date: dateStr,
                 appleId: m.appleId, market: m.market, isCustom: true });
    });
  });
  // All promotion titles
  PROMOTIONS.forEach(p => {
    p.titles.forEach(t => {
      idx.push({ type:'promo', title: t.title, promoName: p.name,
                 date: p.start, endDate: p.end, appleId: t.appleId });
    });
  });
  return idx;
}

function openSearch() {
  if (!searchIndex) searchIndex = buildSearchIndex();
  document.getElementById('searchOverlay').classList.remove('hidden');
  const inp = document.getElementById('searchInput');
  inp.value = '';
  document.getElementById('searchResults').innerHTML =
    '<div class="search-empty">Type to search across all releases and promotions…</div>';
  document.getElementById('searchCount').textContent = '';
  focusedIdx = -1;
  setTimeout(() => inp.focus(), 60);
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.add('hidden');
  focusedIdx = -1;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML =
    '<div class="search-empty">Type to search across all releases and promotions…</div>';
  document.getElementById('searchCount').textContent = '';
  focusedIdx = -1;
  document.getElementById('searchInput').focus();
}

function fmtResultDate(dateStr) {
  return new Date(dateStr + 'T12:00:00')
    .toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function onSearchInput(e) {
  const q = e.target.value.trim().toLowerCase();
  focusedIdx = -1;

  if (q.length < 2) {
    document.getElementById('searchResults').innerHTML =
      '<div class="search-empty">Type to search across all releases and promotions…</div>';
    document.getElementById('searchCount').textContent = '';
    return;
  }

  const matches = searchIndex.filter(item =>
    item.title.toLowerCase().includes(q) ||
    (item.appleId && String(item.appleId).includes(q)) ||
    (item.promoName && item.promoName.toLowerCase().includes(q))
  );

  document.getElementById('searchCount').textContent =
    matches.length ? `${matches.length} result${matches.length > 1 ? 's' : ''}` : '';

  if (!matches.length) {
    document.getElementById('searchResults').innerHTML =
      `<div class="search-empty">No results for "<strong style="color:var(--text2)">${q}</strong>"</div>`;
    return;
  }

  const rels   = matches.filter(m => m.type === 'release');
  const promos = matches.filter(m => m.type === 'promo');
  let html = '';

  if (rels.length) {
    html += `<div class="result-group-label">🎬 Releases (${rels.length})</div>`;
    rels.slice(0, 12).forEach(r => {
      html += `
        <div class="result-item" onclick="goToResult('${r.date}')" data-date="${r.date}">
          <div class="result-item-icon rel">🎬</div>
          <div class="result-item-body">
            <div class="result-item-title">${r.title}</div>
            <div class="result-item-sub">${fmtResultDate(r.date)}${r.market ? ' · ' + r.market : ''}</div>
          </div>
          ${r.appleId ? `<span class="result-item-id">${r.appleId}</span>` : ''}
        </div>`;
    });
    if (rels.length > 12) html += `<div class="result-group-label" style="padding-bottom:10px">+${rels.length - 12} more releases…</div>`;
  }

  if (promos.length) {
    html += `<div class="result-group-label">🏷️ Promotions (${promos.length})</div>`;
    promos.slice(0, 12).forEach(p => {
      html += `
        <div class="result-item" onclick="goToResult('${p.date}')" data-date="${p.date}">
          <div class="result-item-icon promo">🏷️</div>
          <div class="result-item-body">
            <div class="result-item-title">${p.title}</div>
            <div class="result-item-sub">${p.promoName} · ${fmtResultDate(p.date)} → ${fmtResultDate(p.endDate)}</div>
          </div>
          ${p.appleId ? `<span class="result-item-id">${p.appleId}</span>` : ''}
        </div>`;
    });
    if (promos.length > 12) html += `<div class="result-group-label" style="padding-bottom:10px">+${promos.length - 12} more promotion entries…</div>`;
  }

  document.getElementById('searchResults').innerHTML = html;
}

function onSearchKey(e) {
  const items = document.querySelectorAll('#searchResults .result-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusedIdx = Math.max(focusedIdx - 1, 0);
  } else if (e.key === 'Enter' && focusedIdx >= 0) {
    e.preventDefault();
    items[focusedIdx].click();
    return;
  } else if (e.key === 'Escape') {
    closeSearch(); return;
  } else { return; }

  items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
  items[focusedIdx]?.scrollIntoView({ block:'nearest' });
}

function goToResult(dateStr) {
  closeSearch();
  const d = new Date(dateStr + 'T12:00:00');
  curYear  = d.getFullYear();
  curMonth = d.getMonth();
  render();
  setTimeout(() => openDayPanel(dateStr), 80);
}

// ⌘K / Ctrl+K shortcut
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    if (localStorage.getItem(GATE_KEY) === '1') openSearch();
  }
  if (e.key === 'Escape') closeSearch();
});

/* ── GATE ─────────────────────────────────────────────────── */
const GATE_KEY = 'atv_auth';
const GATE_PWD = 'Apple123!';

function checkGate() {
  const input = document.getElementById('gateInput');
  const error = document.getElementById('gateError');
  if (input.value === GATE_PWD) {
    localStorage.setItem(GATE_KEY, '1');
    document.getElementById('gate').classList.add('hidden');
    error.textContent = '';
  } else {
    input.classList.add('error');
    error.textContent = 'Incorrect password. Try again.';
    input.value = '';
    setTimeout(() => input.classList.remove('error'), 400);
    input.focus();
  }
}

// Auto-unlock if already authenticated
if (localStorage.getItem(GATE_KEY) === '1') {
  document.getElementById('gate').classList.add('hidden');
} else {
  setTimeout(() => document.getElementById('gateInput').focus(), 100);
}

/* ── INIT ─────────────────────────────────────────────────── */
render();
</script>
</body>
